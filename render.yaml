services:
  - type: web
    name: livechat-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: python run.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_API_KEY
        value: demo-api-key-123
      - key: FLASK_DEBUG
        value: "0"
